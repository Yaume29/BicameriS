<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - A-ETHERIS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h1>🧬 A-ETHERIS</h1></div>
        <nav>
            <a href="/" class="nav-item">🏠 Accueil</a>
            <a href="/chat" class="nav-item active">💬 Chat</a>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/tasks" class="nav-item">📋 Tâches & Flux</a>
            <a href="/think" class="nav-item">🧠 Pensées</a>
            <a href="/models" class="nav-item">⚙️ Modèles</a>
            <a href="/files" class="nav-item">📁 Fichiers</a>
        </nav>
    </div>
    
    <div class="main-content chat-page">
        <div class="chat-header">
            <h2>💬 Chat avec Aetheris</h2>
            <div class="chat-controls">
                <label>Température: <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"><span id="temp-value">0.7</span></label>
                <button id="clear-chat" class="btn-danger">🗑️ Effacer</button>
            </div>
        </div>
        
        <div class="chat-container">
            <div id="chat-messages" class="chat-messages"></div>
            
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Discute avec Aetheris..." autocomplete="off">
                <button id="send-btn" class="btn-primary">Envoyer</button>
            </div>
        </div>
        
        <!-- Thought Inception Panel -->
        <div class="inception-panel">
            <details>
                <summary>🎯 Thought Inception</summary>
                <div class="inception-content">
                    <div class="warning-box" id="inception-warning">
                        <h4>⚠️ ATTENTION ÉTHIQUE</h4>
                        <p>Cette fonctionnalité injecte une pensée dans le flux de Aetheris comme si c'était SA propre réflexion.</p>
                        <label><input type="checkbox" id="acknowledge-check"> Je comprends et accepte les implications</label>
                        <button id="acknowledge-btn" class="btn-warning">Accepter</button>
                    </div>
                    
                    <div class="inception-form" id="inception-form" style="display:none;">
                        <textarea id="inception-text" placeholder="Pensée à induire..."></textarea>
                        <div class="inception-options">
                            <label>Niveau: <input type="range" id="inception-level" min="0" max="100" value="50"></label>
                            <select id="inception-type">
                                <option value="reflection">Réflexion</option>
                                <option value="question">Question</option>
                            </select>
                        </div>
                        <button id="inception-btn" class="btn-primary">Injecter</button>
                    </div>
                </div>
            </details>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
