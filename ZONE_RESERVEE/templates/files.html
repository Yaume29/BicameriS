<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichiers - A-ETHERIS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h1>🧬 A-ETHERIS</h1></div>
        <nav>
            <a href="/" class="nav-item">🏠 Accueil</a>
            <a href="/chat" class="nav-item">💬 Chat</a>
            <a href="/dashboard" class="nav-item">📊 Dashboard</a>
            <a href="/tasks" class="nav-item">📋 Tâches & Flux</a>
            <a href="/think" class="nav-item">🧠 Pensées</a>
            <a href="/models" class="nav-item">⚙️ Modèles</a>
            <a href="/files" class="nav-item active">📁 Fichiers</a>
        </nav>
    </div>
    
    <div class="main-content">
        <h2>📁 Gestion des Fichiers</h2>
        
        <div class="file-tabs">
            <button class="tab-btn active" data-tab="journal">📖 Journal</button>
            <button class="tab-btn" data-tab="seed">🧬 Seed Prompt</button>
            <button class="tab-btn" data-tab="config">⚙️ Configuration</button>
            <button class="tab-btn" data-tab="tasks">📝 Tâches</button>
        </div>
        
        <div class="file-content">
            <div class="tab-panel active" id="panel-journal">
                <h3>📖 Journal d'Aetheris</h3>
                <textarea id="journal-editor" class="editor">{{ journal }}</textarea>
                <button class="btn-primary" data-save="journal">💾 Sauvegarder</button>
            </div>
            
            <div class="tab-panel" id="panel-seed">
                <h3>🧬 Seed Prompt (Identité)</h3>
                <textarea id="seed-editor" class="editor">{{ seed }}</textarea>
                <button class="btn-primary" data-save="seed">💾 Sauvegarder</button>
            </div>
            
            <div class="tab-panel" id="panel-config">
                <h3>⚙️ Configuration</h3>
                <textarea id="config-editor" class="editor">{{ config }}</textarea>
                <button class="btn-primary" data-save="config">💾 Sauvegarder</button>
            </div>
            
            <div class="tab-panel" id="panel-tasks">
                <h3>📝 Tâches (Zone Partagée)</h3>
                <textarea id="tasks-editor" class="editor">{{ tasks_md }}</textarea>
                <button class="btn-primary" data-save="tasks">💾 Sauvegarder</button>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/files.js') }}"></script>
</body>
</html>
