version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_INSTANCE_NAME=aetheris
    volumes:
      - searxng_config:/etc/searxng
    restart: unless-stopped

  aetheris:
    build: .
    container_name: aetheris-container
    volumes:
      - ./ZONE_AETHERIS:/aetheris
      - ./ZONE_PARTAGEE:/partage
    environment:
      - LM_STUDIO_URL=http://host.docker.internal:1234
      - SEARXNG_URL=http://searxng:8080
      - CUDA_VISIBLE_DEVICES=0
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  searxng_config:
