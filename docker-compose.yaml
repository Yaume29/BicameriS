services:
  # SearXNG - Meta-search engine
  searxng:
    image: searxng/searxng:latest
    container_name: aetheris-searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_INSTANCE_NAME=aetheris
    volumes:
      - searxng_config:/etc/searxng
    restart: unless-stopped
    networks:
      - aetheris-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Aetheris Flask App
  aetheris:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aetheris-container
    volumes:
      - ./ZONE_AETHERIS:/app/ZONE_AETHERIS
      - ./ZONE_PARTAGEE:/app/ZONE_PARTAGEE
      - ./ZONE_RESERVEE:/app/ZONE_RESERVEE
    environment:
      - FLASK_ENV=development
      - LM_STUDIO_URL=http://host.docker.internal:1234
      - SEARXNG_URL=http://searxng:8080
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    networks:
      - aetheris-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - searxng
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/entropy"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: aetheris-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aetheris-network
    restart: unless-stopped

  # Grafana - Monitoring dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: aetheris-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aetheris123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - aetheris-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  aetheris-network:
    driver: bridge

volumes:
  searxng_config:
  prometheus_data:
  grafana_data:
