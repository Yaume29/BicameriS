<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Magenta Glow Filter -->
    <filter id="magentaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Amber Glow Filter -->
    <filter id="amberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text Glow -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for right hemisphere -->
    <linearGradient id="magentaPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff003c"/>
      <stop offset="50%" stop-color="#d4004a"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>

    <!-- Amber gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffb700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>

    <!-- Circuit pattern -->
    <pattern id="circuitPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M0 20 H15 M25 20 H40 M20 0 V15 M20 25 V40" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
      <circle cx="20" cy="20" r="2" fill="#00f0ff" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Void Black Background -->
  <rect width="100%" height="100%" fill="#0b0c10"/>
  
  <!-- Subtle background grid -->
  <rect x="50" y="50" width="700" height="500" fill="url(#circuitPattern)" opacity="0.15"/>

  <!-- LEFT HEMISPHERE - Logic/Circuitry -->
  <g id="left-hemisphere" filter="url(#cyanGlow)">
    <!-- Main brain outline - angular/geometric -->
    <path d="M400 120 L320 130 L240 160 L180 220 L150 300 L145 380 L155 450 L180 510 L230 560 L290 590 L350 600 L400 595" 
          fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Circuit pathways -->
    <path d="M380 140 L300 150 L260 180 L220 240 L200 300 L195 360 L205 420 L230 480 L280 530 L340 555" 
          fill="none" stroke="#00f0ff" stroke-width="1.5"/>
    
    <!-- Tech nodes cluster 1 -->
    <g opacity="0.9">
      <rect x="180" y="200" width="25" height="25" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
      <rect x="185" y="205" width="15" height="15" fill="#00f0ff" opacity="0.3"/>
      <line x1="205" y1="212" x2="240" y2="212" stroke="#00f0ff" stroke-width="1"/>
      <rect x="240" y="205" width="18" height="14" fill="none" stroke="#00f0ff" stroke-width="1"/>
    </g>
    
    <!-- Tech nodes cluster 2 -->
    <g opacity="0.9">
      <polygon points="200,310 220,295 240,310 240,335 220,350 200,335" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
      <circle cx="220" cy="325" r="8" fill="#00f0ff" opacity="0.4"/>
      <line x1="240" y1="325" x2="280" y2="325" stroke="#00f0ff" stroke-width="1.5"/>
      <line x1="220" y1="350" x2="220" y2="390" stroke="#00f0ff" stroke-width="1.5"/>
    </g>
    
    <!-- Circuit traces horizontal -->
    <path d="M150 280 H200 L215 265 H260 L280 280 H320" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <path d="M160 400 H200 L215 385 H250 L270 400 H310" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <path d="M180 480 H230 H280" fill="none" stroke="#00f0ff" stroke-width="1"/>
    
    <!-- Circuit traces vertical -->
    <path d="M250 180 V230 V280" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <path d="M300 200 V260 V320" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <path d="M340 240 V300 V360" fill="none" stroke="#00f0ff" stroke-width="1"/>
    
    <!-- Processing units -->
    <g>
      <rect x="270" y="250" width="30" height="20" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
      <line x1="275" y1="255" x2="295" y2="255" stroke="#00f0ff" stroke-width="0.5"/>
      <line x1="275" y1="260" x2="290" y2="260" stroke="#00f0ff" stroke-width="0.5"/>
      <line x1="275" y1="265" x2="292" y2="265" stroke="#00f0ff" stroke-width="0.5"/>
    </g>
    
    <!-- Data flow nodes -->
    <circle cx="320" cy="180" r="4" fill="#00f0ff"/>
    <circle cx="350" cy="220" r="3" fill="#00f0ff"/>
    <circle cx="280" cy="420" r="4" fill="#00f0ff"/>
    <circle cx="310" cy="480" r="3" fill="#00f0ff"/>
    <circle cx="250" cy="520" r="4" fill="#00f0ff"/>
    
    <!-- Brutalist tech frame -->
    <path d="M160 250 L175 250 L175 265 L160 265 Z" fill="#00f0ff" opacity="0.5"/>
    <path d="M165 430 L180 430 L180 450 L165 450 Z" fill="#00f0ff" opacity="0.5"/>
    <path d="M190 520 L205 520 L205 535 L190 535 Z" fill="#00f0ff" opacity="0.5"/>
    
    <!-- Angular accent lines -->
    <path d="M200 160 L240 150 L280 155" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.7"/>
    <path d="M170 340 L190 340 L200 350" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.7"/>
    
    <!-- Connection ports -->
    <g>
      <rect x="360" y="280" width="20" height="30" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
      <circle cx="370" cy="290" r="3" fill="#00f0ff"/>
      <circle cx="370" cy="300" r="3" fill="#00f0ff"/>
    </g>
    
    <g>
      <rect x="355" y="380" width="25" height="35" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
      <line x1="360" y1="390" x2="375" y2="390" stroke="#00f0ff" stroke-width="1"/>
      <line x1="360" y1="400" x2="375" y2="400" stroke="#00f0ff" stroke-width="1"/>
    </g>

    <!-- Extra circuitry detail -->
    <path d="M230 360 L250 360 L250 400 L280 400" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
    <rect x="310" y="350" width="15" height="25" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <path d="M325 362 H345 V400 H370" fill="none" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- RIGHT HEMISPHERE - Intuition/Organic -->
  <g id="right-hemisphere" filter="url(#magentaGlow)">
    <!-- Main organic brain outline -->
    <path d="M400 120 Q450 115 500 130 Q560 150 610 200 Q650 260 665 330 Q670 400 660 460 Q645 520 600 565 Q550 600 480 605 Q440 608 400 595" 
          fill="none" stroke="url(#magentaPurpleGrad)" stroke-width="2" opacity="0.6"/>
    
    <!-- Neural web - fluid bezier curves -->
    <path d="M420 150 Q480 160 520 200 Q560 240 580 300 Q590 350 585 400" 
          fill="none" stroke="#ff003c" stroke-width="1.5"/>
    
    <path d="M430 180 Q470 200 500 250 Q530 310 540 370 Q545 420 530 470" 
          fill="none" stroke="#d4004a" stroke-width="1.5"/>
    
    <path d="M440 220 Q480 260 500 320 Q510 380 495 430 Q480 480 450 520" 
          fill="none" stroke="#8a2be2" stroke-width="1.5"/>
    
    <!-- Chaotic neural connections -->
    <path d="M460 160 Q520 180 560 220 Q600 280 610 340 Q615 400 590 460" 
          fill="none" stroke="#ff003c" stroke-width="1" opacity="0.8"/>
    
    <path d="M480 190 Q530 230 550 290 Q560 350 545 410" 
          fill="none" stroke="#8a2be2" stroke-width="1" opacity="0.8"/>
    
    <!-- Synaptic nodes -->
    <circle cx="520" cy="180" r="5" fill="#ff003c" opacity="0.7"/>
    <circle cx="560" cy="240" r="4" fill="#d4004a" opacity="0.7"/>
    <circle cx="580" cy="310" r="6" fill="#ff003c" opacity="0.6"/>
    <circle cx="575" cy="380" r="4" fill="#8a2be2" opacity="0.7"/>
    <circle cx="550" cy="440" r="5" fill="#d4004a" opacity="0.7"/>
    <circle cx="510" cy="490" r="4" fill="#8a2be2" opacity="0.7"/>
    <circle cx="470" cy="530" r="5" fill="#ff003c" opacity="0.6"/>
    
    <!-- Wild neural tendrils -->
    <path d="M500 260 Q540 270 560 300 Q575 340 560 380" 
          fill="none" stroke="#ff003c" stroke-width="1.2"/>
    <path d="M520 300 Q550 330 555 370 Q555 410 535 450" 
          fill="none" stroke="#8a2be2" stroke-width="1.2"/>
    
    <!-- Organic curves cluster top -->
    <path d="M450 170 Q480 165 510 180 Q540 200 550 230" 
          fill="none" stroke="#ff003c" stroke-width="1" opacity="0.6"/>
    <path d="M470 175 Q500 185 525 210" 
          fill="none" stroke="#8a2be2" stroke-width="0.8" opacity="0.5"/>
    
    <!-- Organic curves cluster middle -->
    <path d="M440 320 Q480 340 510 380 Q530 420 520 460" 
          fill="none" stroke="#d4004a" stroke-width="1.5"/>
    <path d="M450 350 Q490 380 510 420" 
          fill="none" stroke="#8a2be2" stroke-width="1" opacity="0.7"/>
    
    <!-- Synapse bursts -->
    <g opacity="0.8">
      <circle cx="540" cy="270" r="2" fill="#ff003c"/>
      <path d="M540 265 V262 M540 275 V278 M535 270 H532 M545 270 H548" stroke="#ff003c" stroke-width="0.5"/>
    </g>
    
    <g opacity="0.8">
      <circle cx="565" cy="350" r="2.5" fill="#d4004a"/>
      <path d="M565 345 V341 M565 355 V359 M560 350 H556 M570 350 H574" stroke="#d4004a" stroke-width="0.5"/>
    </g>

    <!-- Connection points to bridge -->
    <path d="M430 280 Q420 285 420 300" fill="none" stroke="#ff003c" stroke-width="1"/>
    <path d="M435 380 Q425 390 420 400" fill="none" stroke="#8a2be2" stroke-width="1"/>
    <path d="M430 480 Q420 490 415 495" fill="none" stroke="#d4004a" stroke-width="1"/>
    
    <!-- Extra neural webbing -->
    <path d="M600 260 Q620 300 615 350 Q610 400 590 440" fill="none" stroke="#ff003c" stroke-width="0.8" opacity="0.6"/>
    <circle cx="610" cy="300" r="3" fill="#ff003c" opacity="0.5"/>
    <circle cx="605" cy="400" r="3" fill="#8a2be2" opacity="0.5"/>
  </g>

  <!-- CORPUS CALLOSUM - The Bridge -->
  <g id="corpus-callosum" filter="url(#amberGlow)">
    <!-- Central structural pillar -->
    <path d="M395 140 L405 140 L410 250 L408 350 L410 450 L405 560 L395 560 L390 450 L392 350 L390 250 Z" 
          fill="url(#amberGrad)" opacity="0.3"/>
    
    <!-- Data bus lines -->
    <path d="M392 160 H408 M391 200 H409 M390 240 H410 M389 280 H411 M388 320 H412 M387 360 H413 M388 400 H412 M389 440 H411 M390 480 H410 M391 520 H409 M392 550 H408" 
          stroke="#ffb700" stroke-width="1.5"/>
    
    <!-- Energy pulse nodes -->
    <circle cx="400" cy="180" r="6" fill="#ffd700" opacity="0.8"/>
    <circle cx="400" cy="180" r="3" fill="#fff"/>
    
    <circle cx="400" cy="280" r="6" fill="#ffb700" opacity="0.8"/>
    <circle cx="400" cy="280" r="3" fill="#fff"/>
    
    <circle cx="400" cy="380" r="6" fill="#ff8c00" opacity="0.8"/>
    <circle cx="400" cy="380" r="3" fill="#fff"/>
    
    <circle cx="400" cy="480" r="6" fill="#ffb700" opacity="0.8"/>
    <circle cx="400" cy="480" r="3" fill="#fff"/>
    
    <!-- Connection bridges to hemispheres -->
    <!-- Left connections -->
    <path d="M380 280 H390" stroke="#ffb700" stroke-width="2"/>
    <path d="M380 380 H388" stroke="#ffb700" stroke-width="2"/>
    <path d="M375 480 H390" stroke="#ffb700" stroke-width="2"/>
    
    <!-- Right connections -->
    <path d="M410 280 H420" stroke="#ffb700" stroke-width="2"/>
    <path d="M412 380 H420" stroke="#ffb700" stroke-width="2"/>
    <path d="M410 480 H420" stroke="#ffb700" stroke-width="2"/>
    
    <!-- Data flow particles -->
    <circle cx="398" cy="230" r="2" fill="#ffd700" opacity="0.9"/>
    <circle cx="402" cy="330" r="2" fill="#ffb700" opacity="0.9"/>
    <circle cx="400" cy="430" r="2" fill="#ff8c00" opacity="0.9"/>
    <circle cx="398" cy="530" r="2" fill="#ffb700" opacity="0.9"/>
    
    <!-- Bridge frame -->
    <rect x="385" y="150" width="30" height="420" fill="none" stroke="#ffb700" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Top and bottom caps -->
    <path d="M385 150 L400 135 L415 150" fill="none" stroke="#ffb700" stroke-width="1.5"/>
    <path d="M385 570 L400 585 L415 570" fill="none" stroke="#ffb700" stroke-width="1.5"/>
  </g>

  <!-- TYPOGRAPHY -->
  <g id="typography">
    <!-- Main Title: BicameriS -->
    <text x="400" y="680" 
          text-anchor="middle" 
          font-family="'Courier New', monospace" 
          font-size="52" 
          font-weight="bold"
          letter-spacing="12"
          fill="#00f0ff" 
          filter="url(#cyanGlow)">BicameriS</text>
    
    <!-- Subtitle: Diadikos - Palladion -->
    <text x="400" y="720" 
          text-anchor="middle" 
          font-family="'Courier New', monospace" 
          font-size="22" 
          letter-spacing="6"
          fill="#ff003c" 
          filter="url(#magentaGlow)">Diadikos — Palladion</text>
    
    <!-- Signature: By Hope 'n Mind -->
    <text x="760" y="775" 
          text-anchor="end" 
          font-family="sans-serif" 
          font-size="14" 
          font-style="italic"
          letter-spacing="2"
          fill="#ffb700" 
          filter="url(#textGlow)"
          opacity="0.9">By Hope 'n Mind</text>
  </g>

  <!-- Ambient particles -->
  <g opacity="0.4">
    <circle cx="150" cy="180" r="1" fill="#00f0ff"/>
    <circle cx="180" cy="580" r="1.5" fill="#00f0ff"/>
    <circle cx="650" cy="200" r="1" fill="#ff003c"/>
    <circle cx="620" cy="500" r="1.5" fill="#8a2be2"/>
    <circle cx="300" cy="620" r="1" fill="#ffb700"/>
    <circle cx="500" cy="620" r="1" fill="#ffb700"/>
  </g>
</svg>