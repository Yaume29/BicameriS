<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="diadikosGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="palladionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="450" fill="#0f172a" rx="15"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="bold">ARCHITECTURE BICAMERIS</text>
  
  <!-- Diadikos Module -->
  <g transform="translate(50, 70)">
    <rect width="220" height="180" fill="url(#diadikosGrad)" rx="10" filter="url(#boxShadow)"/>
    <text x="110" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">DIADIKOS</text>
    <text x="110" y="50" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">(Le Flux)</text>
    
    <!-- Logic Submodule -->
    <rect x="20" y="65" width="85" height="50" fill="#1e3a5f" rx="5"/>
    <text x="62" y="85" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10" font-weight="bold">LOGIQUE</text>
    <text x="62" y="102" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="9">Qwen 2.5</text>
    <text x="62" y="115" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="9">14B GGUF</text>
    
    <!-- Intuition Submodule -->
    <rect x="115" y="65" width="85" height="50" fill="#1e3a5f" rx="5"/>
    <text x="157" y="85" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10" font-weight="bold">INTUITION</text>
    <text x="157" y="102" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="9">Gemma 2</text>
    <text x="157" y="115" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="9">9B GGUF</text>
    
    <!-- Corpus Callosum -->
    <rect x="40" y="130" width="140" height="35" fill="#0ea5e9" rx="5"/>
    <text x="110" y="148" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">CORPS CALLEUX</text>
    <text x="110" y="162" text-anchor="middle" fill="#bae6fd" font-family="Arial, sans-serif" font-size="8">Synthèse α·L + β·R</text>
  </g>
  
  <!-- Palladion Module -->
  <g transform="translate(330, 70)">
    <rect width="220" height="180" fill="url(#palladionGrad)" rx="10" filter="url(#boxShadow)"/>
    <text x="110" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">PALLADION</text>
    <text x="110" y="50" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">(La Garde)</text>
    
    <!-- AST Validator -->
    <rect x="20" y="65" width="85" height="50" fill="#3f1818" rx="5"/>
    <text x="62" y="80" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="9" font-weight="bold">AST</text>
    <text x="62" y="95" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="8">Validator</text>
    <text x="62" y="108" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="8">Python</text>
    
    <!-- Sandbox -->
    <rect x="115" y="65" width="85" height="50" fill="#3f1818" rx="5"/>
    <text x="157" y="85" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SANDBOX</text>
    <text x="157" y="102" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="9">Isolation</text>
    <text x="157" y="115" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-size="9">Hermetique</text>
    
    <!-- Monitoring -->
    <rect x="40" y="130" width="140" height="35" fill="#dc2626" rx="5"/>
    <text x="110" y="148" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">MONITORING</text>
    <text x="110" y="162" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="8">Accès Fichiers + Privilèges</text>
  </g>
  
  <!-- Connection Arrows -->
  <g stroke="#06b6d4" stroke-width="3" fill="none" opacity="0.7">
    <path d="M 270 160 L 320 160" marker-end="url(#arrowhead)"/>
    <path d="M 320 200 L 270 200" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
  </defs>
  
  <!-- LLM Core -->
  <g transform="translate(180, 280)">
    <rect width="240" height="80" fill="url(#coreGrad)" rx="10" filter="url(#boxShadow)"/>
    <text x="120" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">LLM LOCAL ENGINE</text>
    <text x="120" y="55" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="10">GGUF Format | Quantization</text>
    <text x="120" y="70" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="10">VRAM Management | K-Means</text>
  </g>
  
  <!-- Pulse Indicator -->
  <g transform="translate(50, 380)">
    <text x="0" y="0" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Pulse Entropique:</text>
    
    <rect x="100" y="-8" width="40" height="16" fill="#dc2626" rx="3"/>
    <text x="120" y="4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">REPOS</text>
    
    <rect x="160" y="-8" width="40" height="16" fill="#eab308" rx="3"/>
    <text x="180" y="4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">ACTIF</text>
    
    <rect x="220" y="-8" width="40" height="16" fill="#3b82f6" rx="3"/>
    <text x="240" y="4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">DÉRIVE</text>
  </g>
</svg>
