<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="leftHemisphere" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightHemisphere" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="corpusCallosum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">DIADIKOS - Architecture Bicamérale</text>
  
  <!-- Left Hemisphere (Logic) -->
  <ellipse cx="140" cy="160" rx="70" ry="50" fill="url(#leftHemisphere)" opacity="0.8" filter="url(#glow)"/>
  <text x="140" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LOGIQUE</text>
  <text x="140" y="180" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">Analyse Rationnelle</text>
  
  <!-- Right Hemisphere (Intuition) -->
  <ellipse cx="260" cy="160" rx="70" ry="50" fill="url(#rightHemisphere)" opacity="0.8" filter="url(#glow)"/>
  <text x="260" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">INTUITION</text>
  <text x="260" y="180" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10">Créativité Synthétique</text>
  
  <!-- Corpus Callosum -->
  <path d="M 170 160 Q 200 140 230 160 Q 200 180 170 160" fill="url(#corpusCallosum)" opacity="0.9" filter="url(#glow)"/>
  <text x="200" y="155" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Corps Calleux</text>
  
  <!-- Neural Connections -->
  <g stroke="#06b6d4" stroke-width="1" opacity="0.5">
    <line x1="120" y1="140" x2="150" y2="130"/>
    <line x1="160" y1="135" x2="180" y2="125"/>
    <line x1="220" y1="125" x2="240" y2="135"/>
    <line x1="250" y1="130" x2="280" y2="140"/>
    <line x1="130" y1="190" x2="155" y2="200"/>
    <line x1="245" y1="200" x2="270" y2="190"/>
  </g>
  
  <!-- Pulse Indicators -->
  <circle cx="140" cy="120" r="8" fill="#22c55e" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="120" r="8" fill="#22c55e" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Legend -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="15" height="15" fill="url(#leftHemisphere)" rx="3"/>
    <text x="20" y="12" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Hémisphère Gauche</text>
    
    <rect x="120" y="0" width="15" height="15" fill="url(#rightHemisphere)" rx="3"/>
    <text x="140" y="12" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Hémisphère Droit</text>
    
    <rect x="250" y="0" width="15" height="15" fill="url(#corpusCallosum)" rx="3"/>
    <text x="270" y="12" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Synthèse</text>
  </g>
</svg>
