<svg width="650" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#00d4ff"/>
    </marker>
  </defs>
  
  <text x="325" y="20" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">FLUX DE TRAITEMENT COMPLET</text>
  
  <!-- Row 1: Input -->
  <rect x="250" y="40" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="325" y="65" text-anchor="middle" fill="white" font-size="12">REQUÊTE UTILISATEUR</text>
  
  <!-- Row 2: Decision -->
  <line x1="325" y1="80" x2="325" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <rect x="250" y="100" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#feca57" stroke-width="2"/>
  <text x="325" y="125" text-anchor="middle" fill="#feca57" font-size="11">VÉRIFICATION TRAUMA</text>
  
  <!-- Row 3: Entropy -->
  <line x1="325" y1="140" x2="325" y2="160" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <rect x="250" y="160" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#7b2ff7" stroke-width="2"/>
  <text x="325" y="185" text-anchor="middle" fill="#7b2ff7" font-size="11">PULSE ENTROPIQUE</text>
  
  <!-- Row 4: Mode Decision -->
  <line x1="325" y1="200" x2="325" y2="210" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <polygon points="325,220 300,250 350,250" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="325" y="242" text-anchor="middle" fill="#00ff88" font-size="9">MODE</text>
  
  <!-- Branch left -->
  <line x1="300" y1="250" x2="150" y2="280" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="50" y="280" width="120" height="40" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="110" y="305" text-anchor="middle" fill="#00d4ff" font-size="10">LOGIQUE</text>
  <text x="110" y="318" fill="#666" font-size="8">Pulse &lt; 0.75</text>
  
  <!-- Branch right -->
  <line x1="350" y1="250" x2="500" y2="280" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="480" y="280" width="120" height="40" rx="8" fill="#1a1a2e" stroke="#7b2ff7" stroke-width="2"/>
  <text x="540" y="305" text-anchor="middle" fill="#7b2ff7" font-size="10">INTUITIF</text>
  <text x="540" y="318" fill="#666" font-size="8">Pulse &gt; 0.75</text>
  
  <!-- Row 5: Processing -->
  <line x1="110" y1="320" x2="110" y2="350" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="30" y="350" width="160" height="40" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="110" y="375" text-anchor="middle" fill="#00d4ff" font-size="10">HÉMISPHÈRE GAUCHE</text>
  <text x="110" y="388" fill="#666" font-size="8">Appel d'Outils</text>
  
  <line x1="540" y1="320" x2="540" y2="350" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="460" y="350" width="160" height="40" rx="8" fill="#1a1a2e" stroke="#7b2ff7" stroke-width="2"/>
  <text x="540" y="375" text-anchor="middle" fill="#7b2ff7" font-size="10">HÉMISPHÈRE DROIT</text>
  <text x="540" y="388" fill="#666" font-size="8">Schémas</text>
  
  <!-- Row 6: Synthesis -->
  <line x1="170" y1="390" x2="280" y2="390" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="480" y1="390" x2="370" y2="390" stroke="#7b2ff7" stroke-width="1.5"/>
  <line x1="280" y1="390" x2="280" y2="410" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="370" y1="390" x2="370" y2="410" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <rect x="220" y="410" width="210" height="40" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="325" y="435" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">CORPS CALLEUX</text>
  <text x="325" y="448" fill="#666" font-size="8">Synthèse Bipolaire</text>
  
  <!-- Output -->
  <line x1="325" y1="450" x2="325" y2="470" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="250" y="470" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="325" y="495" text-anchor="middle" fill="white" font-size="12">RÉPONSE FINALE</text>
</svg>