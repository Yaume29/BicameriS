<svg width="400" height="280" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g stroke="#333" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="50" y1="0" x2="50" y2="280"/><line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/><line x1="300" y1="0" x2="300" y2="280"/>
  </g>

  <!-- Diadikos -->
  <ellipse cx="120" cy="110" rx="70" ry="80" fill="none" stroke="url(#brainGrad)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,400;400,0;0,400" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <text x="120" y="100" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">DIADIKOS</text>
  <text x="120" y="120" text-anchor="middle" fill="#00d4ff" font-size="11">Logique &amp; Dialogue</text>
  <text x="120" y="135" text-anchor="middle" fill="#666" font-size="9">Qwen 2.5 Coder</text>

  <!-- Palladion -->
  <ellipse cx="280" cy="110" rx="70" ry="80" fill="none" stroke="url(#brainGrad)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="400,0;0,400;400,0" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <text x="280" y="100" text-anchor="middle" fill="#7b2ff7" font-size="14" font-weight="bold">PALLADION</text>
  <text x="280" y="120" text-anchor="middle" fill="#7b2ff7" font-size="11">Garde &amp; Intuition</text>
  <text x="280" y="135" text-anchor="middle" fill="#666" font-size="9">Gemma 2</text>

  <!-- Corps Calleux -->
  <circle cx="200" cy="110" r="12" fill="#00ff88" filter="url(#glow)">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="90" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">SYNTHÈSE</text>

  <text x="200" y="235" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Diadikos-Palladion</text>
  <text x="200" y="255" text-anchor="middle" fill="#00ff88" font-size="10" letter-spacing="2">LOGIQUE BICAMÉRALE OPÉRATIVE</text>
  <text x="200" y="272" text-anchor="middle" fill="#444" font-size="9">Kernel v1.0.1 (Alpha Release)</text>
</svg>