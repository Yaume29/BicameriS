<svg width="600" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sleepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="20" width="600" height="40" rx="20" fill="url(#sleepGrad)" stroke="#7b2ff7" stroke-width="2"/>
  <text x="300" y="45" text-anchor="middle" fill="white" font-size="14" font-weight="bold">SOMMEIL PARADOXAL</text>
  
  <circle r="10" fill="#7b2ff7">
    <animate attributeName="cx" values="30;570;30" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#00d4ff">
    <animate attributeName="cx" values="100;500;100" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="8" fill="#00ff88">
    <animate attributeName="cx" values="200;400;200" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  
  <text x="50" y="70" fill="#7b2ff7" font-size="9">Compression</text>
  <text x="300" y="70" fill="#00d4ff" font-size="9">Deep Storage</text>
  <text x="550" y="70" fill="#00ff88" font-size="9">Rêveries</text>
</svg>