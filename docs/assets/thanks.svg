<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="#0f172a" rx="10"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">REMERCIMENTS</text>
  
  <!-- Main Star -->
  <g transform="translate(200, 90)">
    <polygon points="0,-35 9,-10 35,-10 15,5 22,30 0,18 -22,30 -15,5 -35,-10 -9,-10" 
             fill="url(#starGrad)" filter="url(#starGlow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Open</text>
    <text x="0" y="20" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Source</text>
  </g>
  
  <!-- Community Icons -->
  <g transform="translate(80, 140)">
    <!-- Python Logo -->
    <circle cx="0" cy="0" r="15" fill="#3776ab" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Py</text>
    <text x="0" y="-20" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">Python</text>
  </g>
  
  <g transform="translate(200, 140)">
    <!-- LLM Icon -->
    <rect x="-12" y="-12" width="24" height="24" fill="#8b5cf6" rx="5" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">AI</text>
    <text x="0" y="-20" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">LLM Locaux</text>
  </g>
  
  <g transform="translate(320, 140)">
    <!-- Security Icon -->
    <circle cx="0" cy="0" r="15" fill="#ef4444" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">🛡️</text>
    <text x="0" y="-20" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">Sécurité</text>
  </g>
  
  <!-- Quote -->
  <text x="200" y="180" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10" font-style="italic">
    "Inspiré par la communauté, construit pour l'avenir"
  </text>
</svg>
