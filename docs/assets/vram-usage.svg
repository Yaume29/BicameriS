<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" fill="none">
  <defs>
    <linearGradient id="vramGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="vramGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="bold">📊 Métriques d'Inférence & VRAM</text>
  
  <!-- Chart Area -->
  <rect x="80" y="70" width="540" height="250" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  
  <!-- Grid lines -->
  <line x1="80" y1="132" x2="620" y2="132" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="195" x2="620" y2="195" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="257" x2="620" y2="257" stroke="#334155" stroke-width="1" opacity="0.5"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="75" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="10">12GB</text>
  <text x="70" y="137" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="10">8GB</text>
  <text x="70" y="200" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="10">4GB</text>
  <text x="70" y="262" text-anchor="end" fill="#64748b" font-family="system-ui" font-size="10">0GB</text>
  
  <!-- VRAM Usage Areas -->
  <!-- Qwen 2.5 Coder (14B) -->
  <path d="M 100 120 L 200 115 L 300 110 L 400 108 L 500 105 L 600 100 L 600 280 L 100 280 Z" 
        fill="url(#vramGrad1)" opacity="0.6"/>
  <path d="M 100 120 L 200 115 L 300 110 L 400 108 L 500 105 L 600 100" 
        stroke="#6366f1" stroke-width="2" fill="none"/>
  
  <!-- Gemma 2 (2B) -->
  <path d="M 100 200 L 200 195 L 300 190 L 400 188 L 500 185 L 600 180 L 600 280 L 100 280 Z" 
        fill="url(#vramGrad2)" opacity="0.6"/>
  <path d="M 100 200 L 200 195 L 300 190 L 400 188 L 500 185 L 600 180" 
        stroke="#ec4899" stroke-width="2" fill="none"/>
  
  <!-- X-axis labels -->
  <text x="130" y="295" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">0s</text>
  <text x="240" y="295" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">5s</text>
  <text x="350" y="295" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">10s</text>
  <text x="460" y="295" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">15s</text>
  <text x="570" y="295" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">20s</text>
  
  <!-- Legend -->
  <rect x="100" y="330" width="160" height="25" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
  <text x="180" y="346" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="bold">🧠 Qwen 2.5 Coder 14B</text>
  
  <rect x="280" y="330" width="140" height="25" rx="6" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="350" y="346" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="10" font-weight="bold">💫 Gemma 2 2B</text>
  
  <!-- Stats Boxes -->
  <rect x="480" y="330" width="180" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="570" y="350" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="11" font-weight="bold">Performance</text>
  <text x="510" y="370" text-anchor="start" fill="#10b981" font-family="system-ui" font-size="10">Qwen: ~55 tok/s</text>
  <text x="510" y="385" text-anchor="start" fill="#10b981" font-family="system-ui" font-size="10">Gemma: ~95 tok/s</text>
</svg>