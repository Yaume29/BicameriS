<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowFlow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="22" font-weight="bold">Flux de Traitement Bicaméral</text>
  
  <!-- Step 1: Input -->
  <rect x="50" y="70" width="120" height="80" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="14" font-weight="bold">📥 Entrée</text>
  <text x="110" y="120" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Prompt utilisateur</text>
  <text x="110" y="135" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">+ Contexte VRAM</text>
  
  <!-- Arrow 1 -->
  <line x1="170" y1="110" x2="210" y2="110" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 2: Parallel Processing -->
  <rect x="220" y="60" width="360" height="200" rx="15" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="12" font-weight="bold">Traitement Parallèle Bicaméral</text>
  
  <!-- Logic Box -->
  <rect x="240" y="100" width="150" height="140" rx="8" fill="url(#flowGrad1)" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="315" y="125" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="12" font-weight="bold">🧠 Logique</text>
  <text x="315" y="145" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Qwen 2.5 Coder</text>
  <text x="315" y="170" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Analyse syntaxique</text>
  <text x="315" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Raisonnement étape</text>
  <text x="315" y="200" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Validation code</text>
  <text x="315" y="220" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="10">~55 tok/s</text>
  
  <!-- Intuition Box -->
  <rect x="410" y="100" width="150" height="140" rx="8" fill="url(#flowGrad1)" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <text x="485" y="125" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="12" font-weight="bold">💫 Intuition</text>
  <text x="485" y="145" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Gemma 2</text>
  <text x="485" y="170" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Patterns créatifs</text>
  <text x="485" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Associations libres</text>
  <text x="485" y="200" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">• Exploration</text>
  <text x="485" y="220" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="10">~95 tok/s</text>
  
  <!-- Arrow 2 -->
  <line x1="580" y1="160" x2="620" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 3: Synthesis -->
  <rect x="630" y="120" width="130" height="80" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <text x="695" y="150" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="bold">🔗 Synthèse</text>
  <text x="695" y="170" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">γ·C(L,R)</text>
  <text x="695" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">Arbitrage pondéré</text>
  
  <!-- Arrow 3 -->
  <path d="M 695 200 L 695 260" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 4: Security Layer -->
  <rect x="250" y="280" width="300" height="90" rx="10" fill="url(#flowGrad2)" opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="13" font-weight="bold">🛡️ PALLADION SECURITY</text>
  
  <rect x="270" y="320" width="80" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="338" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="9">AST Parse</text>
  <text x="310" y="350" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Validation</text>
  
  <rect x="360" y="320" width="80" height="40" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="400" y="338" text-anchor="middle" fill="#06b6d4" font-family="system-ui" font-size="9">Sandbox</text>
  <text x="400" y="350" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Exécution</text>
  
  <rect x="450" y="320" width="80" height="40" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="490" y="338" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="9">Monitor</text>
  <text x="490" y="350" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Surveillance</text>
  
  <!-- Arrows to security -->
  <line x1="170" y1="320" x2="250" y2="320" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <text x="210" y="315" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Auto-Scaffolding</text>
  
  <!-- Arrow 4 -->
  <line x1="400" y1="370" x2="400" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 5: Output -->
  <rect x="320" y="410" width="160" height="70" rx="10" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="440" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="14" font-weight="bold">📤 Sortie</text>
  <text x="400" y="460" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Réponse + Code validé</text>
  <text x="400" y="475" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">~2500ms latence</text>
  
  <!-- Side annotations -->
  <rect x="630" y="280" width="150" height="100" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="705" y="305" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="11" font-weight="bold">⚡ Métabolisme</text>
  <text x="705" y="325" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">• Pulse Entropique</text>
  <text x="705" y="342" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">• Mémoire Traumatique</text>
  <text x="705" y="359" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">• Rollover cognitif</text>
  <text x="705" y="376" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">• K-Means</text>
</svg>