<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratoire - BicameriS</title>
  
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/lab.css">
  <link rel="stylesheet" href="/static/css/laboratoire.css">
  
  <style>
    :root {
      --lab-primary: #00ff95;
      --lab-secondary: #7b2ff7;
      --lab-accent: #00e5ff;
      --lab-bg: #0a0a0f;
      --lab-card: #12121a;
      --lab-border: #222;
      --lab-text: #e0e0e0;
      --lab-text-dim: #666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--lab-bg);
      color: var(--lab-text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    
    .lab-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    /* Header */
    .lab-header {
      padding: 16px 24px;
      background: linear-gradient(90deg, var(--lab-card), var(--lab-bg));
      border-bottom: 1px solid var(--lab-border);
    }
    
    .lab-header h1 {
      font-size: 1.5rem;
      background: linear-gradient(90deg, var(--lab-primary), var(--lab-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .lab-header .subtitle {
      font-size: 0.75rem;
      color: var(--lab-text-dim);
      margin-top: 4px;
    }
    
    /* Tabs */
    .lab-tabs {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      background: var(--lab-card);
      border-bottom: 1px solid var(--lab-border);
    }
    
    .lab-tab {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--lab-border);
      color: var(--lab-text-dim);
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      font-size: 0.875rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .lab-tab:hover {
      background: rgba(255,255,255,0.05);
      color: var(--lab-text);
    }
    
    .lab-tab.active {
      background: var(--lab-bg);
      border-color: var(--lab-primary);
      color: var(--lab-primary);
      border-bottom-color: var(--lab-bg);
    }
    
    /* Content */
    .lab-content {
      flex: 1;
      overflow: hidden;
      background: var(--lab-bg);
    }
    
    .module-container {
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }
    
    /* Common styles */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: var(--lab-text-dim);
    }
    
    textarea, input[type="text"], select {
      width: 100%;
      padding: 12px;
      background: var(--lab-bg);
      border: 1px solid var(--lab-border);
      border-radius: 8px;
      color: var(--lab-text);
      font-size: 0.875rem;
    }
    
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: var(--lab-primary);
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--lab-primary);
      color: #000;
    }
    
    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(0, 255, 149, 0.4);
    }
    
    .btn-danger {
      background: #ff6b6b;
      color: #fff;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .radio-group {
      display: flex;
      gap: 16px;
    }
    
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--lab-text);
    }
    
    /* Loading */
    .lab-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--lab-text-dim);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--lab-border);
      border-top-color: var(--lab-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="lab-container">
    <header class="lab-header">
      <h1>🧬 LABORATOIRE</h1>
      <div class="subtitle">BicameriS | Modules Cognitifs</div>
    </header>
    
    <nav class="lab-tabs" id="lab-tabs">
      <!-- Tabs will be loaded dynamically -->
    </nav>
    
    <main class="lab-content" id="lab-content">
      <div class="lab-loading">
        <div class="spinner"></div>
      </div>
    </main>
  </div>
  
  <script>
    // Lab Application
    class LabApp {
      constructor() {
        this.modules = [];
        this.activeModule = null;
        this.currentTheme = null;
        this.currentSubtheme = null;
        this.init();
      }
      
      async init() {
        await this.loadModules();
        this.renderTabs();
        if (this.modules.length > 0) {
          this.selectModule(this.modules[0].id);
        }
      }
      
      async loadModules() {
        try {
          const response = await fetch('/api/lab/modules');
          const data = await response.json();
          this.modules = data.modules || [];
        } catch (e) {
          console.error('Failed to load modules:', e);
          this.modules = [];
        }
      }
      
      renderTabs() {
        const tabsContainer = document.getElementById('lab-tabs');
        tabsContainer.innerHTML = this.modules.map(mod => `
          <button class="lab-tab ${mod.id === this.activeModule ? 'active' : ''}" 
                  data-module="${mod.id}"
                  onclick="labApp.selectModule('${mod.id}')">
            <span>${mod.icon}</span>
            <span>${mod.name}</span>
          </button>
        `).join('');
      }
      
      async selectModule(moduleId) {
        this.activeModule = moduleId;
        
        document.querySelectorAll('.lab-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.module === moduleId);
        });
        
        const content = document.getElementById('lab-content');
        content.innerHTML = '<div class="lab-loading"><div class="spinner"></div></div>';
        
        try {
          const response = await fetch(`/api/lab/module/${moduleId}/render`);
          const data = await response.json();
          
          if (data.status === 'ok') {
            content.innerHTML = `<div class="module-container">${data.html}</div>`;
            this.initModuleScripts(moduleId);
          } else {
            content.innerHTML = `<div class="module-container"><p>Erreur: ${data.message}</p></div>`;
          }
        } catch (e) {
          content.innerHTML = `<div class="module-container"><p>Erreur de chargement: ${e.message}</p></div>`;
        }
      }
      
      initModuleScripts(moduleId) {
        console.log('Module loaded:', moduleId);
      }
    }
    
    // Global functions for modules
    async function callModuleAction(moduleId, action, data = {}) {
      try {
        const response = await fetch(`/api/lab/module/${moduleId}/action`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...data })
        });
        return await response.json();
      } catch (e) {
        console.error('Module action error:', e);
        return { status: 'error', message: e.message };
      }
    }
    
    // ==================== EDITEUR SPECIALISTE FUNCTIONS ====================
    
    function toggleThemeGroup(themeName) {
      const header = document.querySelector(`[onclick="toggleThemeGroup('${themeName}')"]`);
      const subthemes = document.getElementById(`subthemes-${themeName}`);
      
      if (header && subthemes) {
        header.classList.toggle('expanded');
        subthemes.classList.toggle('show');
      }
    }
    
    async function selectSubtheme(theme, subtheme) {
      const result = await callModuleAction('editeur-specialiste', 'select_theme', { theme, subtheme });
      
      if (result.status === 'ok') {
        labApp.currentTheme = theme;
        labApp.currentSubtheme = subtheme;
        
        document.querySelector('.theme-name').textContent = `${theme} / ${subtheme}`;
        document.querySelector('.theme-icon').textContent = '✅';
        
        addMessage('system', `Thème sélectionné: **${theme}** > *${subtheme}*\n\n${result.preprompt.substring(0, 100)}...`);
      }
    }
    
    async function sendEditeurMessage() {
      const input = document.getElementById('editeur-input');
      const message = input.value.trim();
      
      if (!message) return;
      
      if (!labApp.currentTheme) {
        addMessage('system', 'Veuillez d\'abord sélectionner un thème!');
        return;
      }
      
      addMessage('user', message);
      input.value = '';
      
      showTyping(true);
      
      const result = await callModuleAction('editeur-specialiste', 'send_message', { message });
      
      showTyping(false);
      
      if (result.status === 'ok') {
        addMessage('assistant', result.response);
      } else {
        addMessage('system', 'Erreur: ' + result.message);
      }
    }
    
    async function toggleVerifyHypotheses() {
      if (!labApp.currentTheme) {
        addMessage('system', 'Sélectionnez d\'abord un thème!');
        return;
      }
      
      addMessage('system', '🔍 Demande de vérification des hypothèses...');
      showTyping(true);
      
      const result = await callModuleAction('editeur-specialiste', 'verify_hypotheses', {
        message: 'Liste et vérifie toutes tes hypothèses actuelles.'
      });
      
      showTyping(false);
      
      if (result.status === 'ok') {
        addMessage('assistant', '**Vérification des hypothèses:**\n\n' + result.response);
      } else {
        addMessage('system', 'Erreur: ' + result.message);
      }
    }
    
    async function sendDirection() {
      const direction = prompt('Donnez une direction à l\'IA (ex: "Change d\'approche", "Approfondis ce point"):');
      
      if (!direction) return;
      
      if (!labApp.currentTheme) {
        addMessage('system', 'Sélectionnez d\'abord un thème!');
        return;
      }
      
      addMessage('user', `[DIRECTION]: ${direction}`);
      showTyping(true);
      
      const result = await callModuleAction('editeur-specialiste', 'send_direction', { direction });
      
      showTyping(false);
      
      if (result.status === 'ok') {
        addMessage('assistant', result.response);
      } else {
        addMessage('system', 'Erreur: ' + result.message);
      }
    }
    
    function addMessage(role, content) {
      const container = document.getElementById('editeur-messages');
      if (!container) return;
      
      const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      
      content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      content = content.replace(/\n/g, '<br>');
      
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.innerHTML = `
        <div class="message-content">${content}</div>
        <div class="message-time">${time}</div>
      `;
      
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
    }
    
    function showTyping(show) {
      const container = document.getElementById('editeur-messages');
      if (!container) return;
      
      const existing = document.querySelector('.typing-indicator');
      if (show && !existing) {
        const indicator = document.createElement('div');
        indicator.className = 'message typing-indicator';
        indicator.innerHTML = '<div class="message-content">L\'IA reflète...</div>';
        container.appendChild(indicator);
      } else if (!show && existing) {
        existing.remove();
      }
    }
    
    async function createNewFile() {
      const filename = prompt('Nom du fichier:', 'untitled.py');
      if (!filename) return;
      
      const result = await callModuleAction('editeur-specialiste', 'create_file', { filename });
      
      if (result.status === 'ok') {
        updateFileList();
        document.getElementById('current-file').textContent = filename;
        document.getElementById('file-content').value = '';
      }
    }
    
    async function updateFileList() {
      const result = await callModuleAction('editeur-specialiste', 'list_files');
      
      const container = document.getElementById('workspace-files');
      if (!container) return;
      
      if (result.files && result.files.length > 0) {
        container.innerHTML = result.files.map(f => `
          <div class="file-item" onclick="loadFile('${f}')">📄 ${f}</div>
        `).join('');
      } else {
        container.innerHTML = '<p class="empty">Aucun fichier</p>';
      }
    }
    
    async function loadFile(filename) {
      const result = await callModuleAction('editeur-specialiste', 'read_file', { filename });
      
      if (result.status === 'ok') {
        document.getElementById('current-file').textContent = filename;
        document.getElementById('file-content').value = result.content;
      }
    }
    
    async function saveCurrentFile() {
      const filename = document.getElementById('current-file').textContent;
      const content = document.getElementById('file-content').value;
      
      if (!filename || filename === 'main.py') {
        alert('Créez d\'abord un fichier');
        return;
      }
      
      const result = await callModuleAction('editeur-specialiste', 'save_file', { filename, content });
      
      if (result.status === 'ok') {
        addMessage('system', `💾 Fichier ${filename} sauvegardé`);
      }
    }
    
    // ==================== WORKSPACE FUNCTIONS ====================
    
    async function createWorkspace() {
      const name = prompt('Nom du projet:', 'Nouveau Projet');
      if (!name) return;
      
      const basePath = prompt('Chemin du dossier (laisser vide pour créer un nouveau):');
      
      const result = await callModuleAction('editeur-specialiste', 'workspace_create', {
        name,
        base_path: basePath || null
      });
      
      if (result.status === 'ok' && result.created) {
        addMessage('system', `📁 Workspace créé: ${name}\nChemin: ${result.path}\nType: ${result.project_type}`);
        await refreshWorkspaceTree();
      } else {
        addMessage('system', 'Erreur: ' + (result.message || 'Échec de création'));
      }
    }
    
    async function openWorkspaceFolder() {
      const path = prompt('Entrez le chemin du dossier:');
      if (!path) return;
      
      const result = await callModuleAction('editeur-specialiste', 'workspace_open', { path });
      
      if (result.status === 'ok' && result.id) {
        addMessage('system', `📂 Workspace ouvert: ${result.name}\nType: ${result.project_type}\nFichiers: ${result.files?.length || 0}`);
        await refreshWorkspaceTree();
      } else {
        addMessage('system', 'Erreur: ' + (result.message || 'Échec d\'ouverture'));
      }
    }
    
    async function refreshWorkspaceTree() {
      const result = await callModuleAction('editeur-specialiste', 'workspace_tree', { max_depth: 3 });
      
      const container = document.getElementById('workspace-files');
      if (!container) return;
      
      if (result.status === 'ok' && result.tree) {
        container.innerHTML = renderFileTree(result.tree, '');
      } else {
        container.innerHTML = '<p class="empty">Aucun workspace ouvert</p>';
      }
    }
    
    function renderFileTree(items, indent) {
      if (!items || items.length === 0) return '<p class="empty">Vide</p>';
      
      return items.map(item => {
        if (item.type === 'directory') {
          return `<div class="file-item directory" style="padding-left: ${indent}20px">📁 ${item.name}/</div>`;
        } else {
          return `<div class="file-item" style="padding-left: ${indent}20px" onclick="loadWorkspaceFile('${item.name}')">📄 ${item.name}</div>`;
        }
      }).join('');
    }
    
    async function loadWorkspaceFile(filename) {
      const result = await callModuleAction('editeur-specialiste', 'workspace_read', { filename });
      
      if (result.status === 'ok') {
        document.getElementById('current-file').textContent = filename;
        document.getElementById('file-content').value = result.content;
      }
    }
    
    async function saveWorkspaceFile() {
      const filename = document.getElementById('current-file').textContent;
      const content = document.getElementById('file-content').value;
      
      if (!filename) {
        alert('Aucun fichier sélectionné');
        return;
      }
      
      const result = await callModuleAction('editeur-specialiste', 'workspace_write', { filename, content });
      
      if (result.status === 'ok') {
        addMessage('system', `💾 ${filename} sauvegardé`);
      } else {
        addMessage('system', 'Erreur: ' + result.message);
      }
    }
    
    async function searchInWorkspace() {
      const query = prompt('Rechercher dans le workspace:');
      if (!query) return;
      
      const result = await callModuleAction('editeur-specialiste', 'workspace_search', { query });
      
      if (result.status === 'ok' && result.results?.length > 0) {
        let output = `🔍 Résultats pour "${query}":\n\n`;
        result.results.forEach(r => {
          output += `📄 ${r.file}\n`;
          r.matches?.forEach(m => {
            output += `  Ligne ${m.line}: ${m.content.substring(0, 60)}...\n`;
          });
          output += '\n';
        });
        addMessage('assistant', output);
      } else {
        addMessage('system', 'Aucun résultat trouvé');
      }
    }
    
    // ==================== EXECUTOR FUNCTIONS ====================
    
    async function executeCurrentCode() {
      const code = document.getElementById('file-content').value;
      const language = detectLanguage(document.getElementById('current-file').textContent);
      
      if (!code.trim()) {
        alert('Aucun code à exécuter');
        return;
      }
      
      addMessage('system', `⚙️ Exécution en ${language}...`);
      
      const result = await callModuleAction('editeur-specialiste', 'execute_code', { code, language });
      
      if (result.status === 'success') {
        let output = `✅ Exécution réussie:\n\n`;
        if (result.stdout) output += `**Sortie:**\n${result.stdout}\n`;
        if (result.stderr) output += `**Erreurs:**\n${result.stderr}\n`;
        addMessage('assistant', output);
      } else {
        let output = `❌ Erreur d'exécution:\n\n`;
        output += `**Message:** ${result.message || result.stderr || 'Inconnu'}\n`;
        if (result.hint) output += `**Indice:** ${result.hint}\n`;
        addMessage('assistant', output);
      }
    }
    
    function detectLanguage(filename) {
      if (!filename) return 'python';
      const ext = filename.split('.').pop().toLowerCase();
      const langMap = {
        'py': 'python',
        'js': 'javascript',
        'ts': 'javascript',
        'rs': 'rust',
        'go': 'go',
        'sh': 'bash',
        'ps1': 'powershell'
      };
      return langMap[ext] || 'python';
    }
    
    async function checkAvailableLanguages() {
      const result = await callModuleAction('editeur-specialiste', 'list_available', {});
      
      if (result.status === 'ok') {
        let output = '🔧 Langages disponibles:\n\n';
        for (const [lang, version] of Object.entries(result.available || {})) {
          output += `✅ ${lang}: ${version}\n`;
        }
        if (result.unavailable) {
          output += '\n❌ Non disponibles:\n';
          for (const [lang, msg] of Object.entries(result.unavailable)) {
            output += `- ${lang}: ${msg}\n`;
          }
        }
        addMessage('system', output);
      }
    }
    
    // Handle Enter key in chat input
    document.addEventListener('keypress', function(e) {
      if (e.target.id === 'editeur-input' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendEditeurMessage();
      }
    });
    
    // ==================== INDUCTION FUNCTIONS ====================
    
    function selectInductionMethod(btn) {
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    
    async function startInduction() {
      const text = document.getElementById('induction-text')?.value;
      const intensity = parseInt(document.getElementById('induction-intensity')?.value || 50);
      const method = document.querySelector('.method-btn.active')?.dataset.method || 'context-prefix';
      
      if (!text) {
        alert('Entrez un texte d\'induction');
        return;
      }
      
      const result = await callModuleAction('induction', 'start', { text, method, intensity });
      
      if (result.status === 'ok') {
        document.getElementById('stop-induction-btn').disabled = false;
        addInductionLog('Induction démarrée: ' + method);
      }
    }
    
    async function stopInduction() {
      const result = await callModuleAction('induction', 'stop', {});
      
      if (result.status === 'ok') {
        document.getElementById('stop-induction-btn').disabled = true;
        addInductionLog('Induction arrêtée');
      }
    }
    
    function addInductionLog(text) {
      const container = document.getElementById('induction-log-content');
      if (!container) return;
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span> ${text}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
    }
    
    // ==================== INCEPTION FUNCTIONS ====================
    
    async function sendInception() {
      const prompt = document.getElementById('inception-prompt')?.value;
      const weight = parseInt(document.getElementById('inception-weight')?.value || 50);
      const target = document.querySelector('input[name="target"]:checked')?.value || 'BOTH';
      
      if (!prompt) {
        alert('Entrez un prompt');
        return;
      }
      
      const result = await callModuleAction('inception', 'create', { prompt, weight, target });
      
      if (result.status === 'ok') {
        addInceptionLog('Inception créée: ' + prompt.substring(0, 50) + '...');
      }
    }
    
    function addInceptionLog(text) {
      const container = document.getElementById('active-inceptions');
      if (!container) return;
      
      container.innerHTML = `<div class="inception-item">${text}</div>`;
    }
    
    // ==================== AUTONOME FUNCTIONS ====================
    
    function selectAutonomeMode(btn) {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    
    function swapHemispheres() {
      const receiver = document.getElementById('receiver-hemisphere');
      const responder = document.getElementById('responder-hemisphere');
      
      const temp = receiver.value;
      receiver.value = responder.value;
      responder.value = temp;
    }
    
    async function startAutonome() {
      const mode = document.querySelector('.mode-btn.active')?.dataset.mode || 'relay';
      const reformulation = parseInt(document.getElementById('reformulation-rate')?.value || 73);
      
      const result = await callModuleAction('autonome', 'start', { mode, reformulation });
      
      if (result.status === 'ok') {
        document.getElementById('stop-autonome-btn').disabled = false;
        document.getElementById('autonome-input').disabled = false;
        document.getElementById('autonome-send-btn').disabled = false;
        addAutonomeMessage('system', 'Mode autonome démarré: ' + mode);
      }
    }
    
    async function stopAutonome() {
      const result = await callModuleAction('autonome', 'stop', {});
      
      if (result.status === 'ok') {
        document.getElementById('stop-autonome-btn').disabled = true;
        document.getElementById('autonome-input').disabled = true;
        document.getElementById('autonome-send-btn').disabled = true;
        addAutonomeMessage('system', 'Mode autonome arrêté');
      }
    }
    
    async function sendAutonomeMessage() {
      const input = document.getElementById('autonome-input');
      const message = input.value.trim();
      
      if (!message) return;
      
      const result = await callModuleAction('autonome', 'send', { message });
      
      if (result.status === 'ok') {
        addAutonomeMessage('user', message);
        input.value = '';
        
        setTimeout(() => {
          addAutonomeMessage('assistant', result.message || 'Traitement en cours...');
        }, 500);
      }
    }
    
    function addAutonomeMessage(role, content) {
      const container = document.getElementById('autonome-messages');
      if (!container) return;
      
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.innerHTML = `<div class="message-content">${content}</div>`;
      
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
    }
    
    // Initialize
    const labApp = new LabApp();
  </script>
</body>
