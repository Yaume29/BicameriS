<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicameris Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #e0e0e0;
            overflow: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .progress-bar {
            height: 2px;
            background: #333;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #00ff00;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div id="launcher-ui" class="w-full max-w-2xl p-8 glass rounded-2xl shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-light tracking-widest uppercase">Aetheris <span class="text-green-500 font-bold">Launcher</span></h1>
            <div class="text-xs mono text-gray-500 pulse">SYSTEM_READY_v2.5</div>
        </div>

        <div id="choice-screen">
            <p class="mb-6 text-gray-400 leading-relaxed">
                Choisissez votre environnement d'exécution pour initialiser la conscience bicamérale.
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Docker Choice -->
                <button onclick="selectEnv('docker')" class="group p-6 rounded-xl border border-gray-800 hover:border-green-500 transition-all text-left bg-black/30">
                    <div class="flex items-center mb-3">
                        <div class="w-10 h-10 rounded-lg bg-blue-900/30 flex items-center justify-center mr-3 group-hover:bg-blue-500/20 transition-colors">
                            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        </div>
                        <h2 class="text-xl font-semibold">Conteneur Docker</h2>
                    </div>
                    <ul class="text-xs text-gray-500 space-y-2">
                        <li class="flex items-start"><span class="text-blue-500 mr-2">◈</span> **Isolation Hermétique** : Protège votre système hôte contre toute modification accidentelle par l'IA.</li>
                        <li class="flex items-start"><span class="text-blue-500 mr-2">◈</span> **Zéro Conflit** : Toutes les dépendances (Python, bibliothèques) sont pré-installées dans une image stable.</li>
                        <li class="flex items-start"><span class="text-blue-500 mr-2">◈</span> **Sécurité Maximale** : L'IA évolue dans une "bulle" logicielle sans accès direct à vos fichiers personnels.</li>
                        <li class="text-gray-600 italic mt-2">Recommandé pour l'exploration sécurisée et le développement d'extensions.</li>
                    </ul>
                </button>

                <!-- Local Choice -->
                <button onclick="selectEnv('local')" class="group p-6 rounded-xl border border-gray-800 hover:border-green-500 transition-all text-left bg-black/30">
                    <div class="flex items-center mb-3">
                        <div class="w-10 h-10 rounded-lg bg-orange-900/30 flex items-center justify-center mr-3 group-hover:bg-orange-500/20 transition-colors">
                            <svg class="w-6 h-6 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <h2 class="text-xl font-semibold">Environnement Local</h2>
                    </div>
                    <ul class="text-xs text-gray-500 space-y-2">
                        <li class="flex items-start"><span class="text-orange-500 mr-2">◈</span> **Puissance Brute** : Accès direct à vos coeurs CPU et à la VRAM de votre carte graphique (NVIDIA/AMD).</li>
                        <li class="flex items-start"><span class="text-orange-500 mr-2">◈</span> **Latence Minimale** : Inférence ultra-rapide sans la couche de virtualisation réseau de Docker.</li>
                        <li class="flex items-start"><span class="text-orange-500 mr-2">◈</span> **Intégration Totale** : Aetheris peut interagir directement avec vos outils et fichiers locaux.</li>
                        <li class="text-gray-600 italic mt-2">Recommandé pour les performances d'inférence et l'utilisation de modèles lourds.</li>
                    </ul>
                </button>
            </div>
        </div>

        <div id="loading-screen" class="hidden">
            <div class="mb-8">
                <div class="flex justify-between text-xs mono mb-2">
                    <span id="status-text" class="text-green-500">INITIALISATION...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar rounded-full">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
            
            <div id="console" class="mono text-[10px] text-gray-600 h-32 overflow-hidden bg-black/50 p-4 rounded-lg border border-white/5">
                <!-- Console logs will appear here -->
            </div>
        </div>
    </div>

    <script>
        const logs = [
            "Chargement du noyau Aetheris...",
            "Initialisation du Conductor...",
            "Connexion au Corps Calleux...",
            "Synchronisation des hémisphères...",
            "Vérification de l'entropie hardware...",
            "Chargement de la mémoire traumatique...",
            "Activation du SecurityManager...",
            "Déploiement de l'interface neuronale...",
            "Ouverture du canal de communication...",
            "Aetheris est prête."
        ];

        function selectEnv(env) {
            document.getElementById('choice-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            
            startLoading(env);
        }

        function startLoading(env) {
            let progress = 0;
            const fill = document.getElementById('progress-fill');
            const percent = document.getElementById('progress-percent');
            const status = document.getElementById('status-text');
            const consoleBox = document.getElementById('console');
            
            status.innerText = `INITIALISATION [MODE: ${env.toUpperCase()}]`;

            const interval = setInterval(() => {
                progress += Math.random() * 3;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Set session and redirect
                    fetch('/api/launch', { method: 'POST' })
                        .then(() => {
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1000);
                        });
                }
                
                fill.style.width = `${progress}%`;
                percent.innerText = `${Math.floor(progress)}%`;

                // Add random logs
                if (Math.random() > 0.8 && progress < 100) {
                    const log = logs[Math.floor(Math.random() * logs.length)];
                    const p = document.createElement('p');
                    p.innerText = `> ${log}`;
                    consoleBox.appendChild(p);
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }
            }, 100);
        }
    </script>
</body>
</html>
