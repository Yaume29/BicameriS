<!-- Lab Partial -->
<div class="sub-tabs">
  <button class="sub-tab active">Raisonnement</button>
  <button class="sub-tab">Memoire</button>
  <button class="sub-tab">Bac a sable</button>
</div>
<div class="grid grid-2">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Conscience</span>
      <span class="badge badge-amber">Beta</span>
    </div>
    <div class="panel-body">
      <div class="param-group">
        <div class="param-label">Niveau de conscientisation</div>
        <input type="range" min="0" max="100" value="0" style="width:100%;accent-color:var(--amber);">
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Generateur d'Entropie</span>
      <span class="badge badge-green">Actif</span>
    </div>
    <div class="panel-body">
      <div class="flex justify-between mb-sm">
        <span>Pulse:</span>
        <span class="text-green">0.50</span>
      </div>
    </div>
  </div>
</div>
